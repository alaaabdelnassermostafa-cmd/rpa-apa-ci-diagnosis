<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APA System | CI/CD Remediation Dashboard</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="app-container">
        <header class="glass-header">
            <div class="logo-area">
                <div class="logo-icon">AI</div>
                <h1>APA Dashboard</h1>
            </div>
            <div class="status-indicator">
                <span class="pulse"></span> System Active
            </div>
        </header>

        <main>
            <section class="overview-section">
                <h2>Live CI/CD Remediation Feed</h2>
                <p class="subtitle">Autonomous Process Automation pipeline is listening for GitHub webhooks.</p>
            </section>

            <div id="failures-container" class="failures-grid">
                <!-- Data populated by JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching latest CI/CD failures...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for a failure card -->
    <template id="failure-card-template">
        <div class="glass-card failure-card">
            <div class="card-header">
                <div class="repo-info">
                    <svg class="git-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5.4 5.4 0 0 0 13.5 3a5.4 5.4 0 0 0-4.5 2.5 5.4 5.4 0 0 0-4.5-2.5 5.4 5.4 0 0 0-4.5 5c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5v4c-.2 1-.7 1.7-1.5 2.5C.5 19.4 0 20.7 0 22h24c0-1.3-.5-2.6-1.5-3.5-.8-.8-1.3-1.5-1.5-2.5v-4z"></path></svg>
                    <span class="repo-name"></span>
                </div>
                <div class="status-badge"></div>
            </div>
            
            <div class="card-body">
                <div class="meta-row">
                    <div class="meta-item">
                        <span class="label">Branch:</span>
                        <span class="value branch-name"></span>
                    </div>
                    <div class="meta-item">
                        <span class="label">Commit:</span>
                        <span class="value commit-sha font-mono"></span>
                    </div>
                </div>
                
                <div class="classification-container">
                    <h3>AI Diagnosis</h3>
                    <div class="category-pill"></div>
                </div>

                <div class="remediation-container">
                    <div class="remediation-toggle">
                        <h3>Remediation Plan</h3>
                        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <div class="remediation-content markdown-body font-mono"></div>
                </div>
            </div>
            
            <div class="card-footer">
                <span class="timestamp"></span>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
